<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Kays Apparel</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f8f9fa; padding: 2rem; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 4px; margin-bottom: 1rem; box-sizing: border-box; }
        button { background: #6B4C3B; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; font-weight: 600; }
        button:hover { background: #5a3f31; }
        .sizes { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .size-btn { padding: 0.5rem 1rem; border: 1px solid #d1d5db; background: white; border-radius: 4px; cursor: pointer; }
        .size-btn.selected { background: #6B4C3B; color: white; border-color: #6B4C3B; }
        .message { padding: 1rem; margin: 1rem 0; border-radius: 4px; }
        .success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add Luxe Satin Halter Blouse</h1>
        <form id="productForm">
            <input type="text" id="name" value="Luxe Satin Halter Blouse" placeholder="Product Name" required>
            <input type="number" id="price" value="9000" placeholder="Price (₦)" required>
            <select id="category" required>
                <option value="Blouses" selected>Blouses</option>
                <option value="Dresses">Dresses</option>
                <option value="Skirts">Skirts</option>
                <option value="Tops">Tops</option>
                <option value="Sets">Sets</option>
            </select>
            
            <label>Available Sizes:</label>
            <div class="sizes">
                <button type="button" class="size-btn" data-size="XS">XS</button>
                <button type="button" class="size-btn" data-size="S">S</button>
                <button type="button" class="size-btn selected" data-size="M">M</button>
                <button type="button" class="size-btn selected" data-size="L">L</button>
                <button type="button" class="size-btn" data-size="XL">XL</button>
                <button type="button" class="size-btn" data-size="XXL">XXL</button>
            </div>
            
            <input type="text" id="colors" value="Beige, Ivory" placeholder="Colors (comma separated)" required>
            <textarea id="description" rows="4" placeholder="Description" required>Elegant Luxe Satin Halter Blouse featuring a chic halter neckline with a tie-back closure. Crafted from smooth satin fabric with a flattering draped front and open-back design. Perfect for evening outings or special occasions.</textarea>
            
            <label>Product Images (URLs):</label>
            <input type="url" id="image1" value="https://frabjous-sfogliatella-fff3f2.netlify.app/images/products/Luxe%20Satin%20Halter%20Blouse%20front.png" placeholder="Front image URL" required>
            <input type="url" id="image2" value="https://frabjous-sfogliatella-fff3f2.netlify.app/images/products/Luxe%20Satin%20Halter%20Blouse%20back.png" placeholder="Back image URL (optional)">
            
            <button type="submit">Add Product</button>
            <div id="message"></div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC8TQZpLzVqY3S4h5W7J9K0M1N2O3P4Q5R",
            authDomain: "kaysapparel-8.firebaseapp.com",
            projectId: "kaysapparel-8",
            storageBucket: "kaysapparel-8.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef1234567890"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Size selection
        const selectedSizes = new Set(['M', 'L']);
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const size = this.dataset.size;
                if (selectedSizes.has(size)) {
                    selectedSizes.delete(size);
                    this.classList.remove('selected');
                } else {
                    selectedSizes.add(size);
                    this.classList.add('selected');
                }
            });
        });

        // Form submission
        document.getElementById('productForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const messageEl = document.getElementById('message');
            
            try {
                const product = {
                    name: document.getElementById('name').value,
                    price: parseInt(document.getElementById('price').value) * 100, // Convert to kobo
                    category: document.getElementById('category').value,
                    sizes: Array.from(selectedSizes),
                    colors: document.getElementById('colors').value,
                    description: document.getElementById('description').value,
                    images: [
                        document.getElementById('image1').value,
                        document.getElementById('image2').value
                    ].filter(url => url),
                    inStock: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                const docRef = await db.collection('products').add(product);
                messageEl.innerHTML = `<div class="success">✅ Product added successfully! ID: ${docRef.id}</div>`;
                
                // Reset form
                setTimeout(() => {
                    if (confirm('Product added! Add another?')) {
                        document.getElementById('productForm').reset();
                        messageEl.innerHTML = '';
                    }
                }, 2000);
                
            } catch (error) {
                console.error('Error adding product:', error);
                messageEl.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
